# Deploy: https://dashboard.render.com → New + → Blueprint → repo oder_code
# Database: TiDB Cloud (free) — xem docs/HUONG_DAN_DEPLOY_RENDER_TIDB.md
services:
  - type: web
    name: pho-ha-noi
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        sync: false
      - key: DB_SSL
        value: "true"
